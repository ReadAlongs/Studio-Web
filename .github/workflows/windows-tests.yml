name: Run tests on Windows
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  tests-on-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install -g npm@latest
      - run: npm ci --verbose
      - run: npx update-browserslist-db@latest

      - name: Ng unit test for studio-web
        run: |
          npx nx build web-component
          npx nx test:once studio-web

      - name: Cypress tests - Install Cypress
        run: npx cypress install
      - name: Cypress tests - Verify Cypress
        run: npx cypress verify
      - name: Cypress tests - Run the tests
        shell: bash
        run: |
          npx nx serve web-component &
          npx nx serve-test-data web-component &
          sleep 10
          npx nx test:once web-component

      - name: Localization checks - extraction
        run: npx nx extract-i18n studio-web
      - name: Localization checks - validation of the languages
        run: npx nx check-l10n studio-web

      - name: Build check - ngx-web-component
        run: npx nx build ngx-web-component
      - name: Build check - studio-web
        run: npx nx build studio-web
      - name: Bundle check - web-component
        run: npx nx bundle web-component
