@if (!hidden) {
  <read-along
    #readalong
    [language]="language"
    href="assets/ej-fra.readalong"
    audio="assets/ej-fra.m4a"
  ></read-along>
}
<button (click)="changeLanguage()">change language</button>
<button (click)="changeTheme()">change theme</button>
<button (click)="toggleHidden()">
  @if (hidden) {
    <span>Show</span>
  }
  @if (!hidden) {
    <span>Hide</span>
  }
</button>
